{% extends 'base.html' %}
{% block content %}
<div class="page-header"><h1>Review Weekly Report</h1><p>{{ object.student.full_name }}: {{ object.week_start }} to {{ object.week_end }}</p></div>
<div class="card" style="max-width:720px">
  <p class="mb-1">{{ object.summary }}</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary">Save Review</button>
  </form>
</div>
{% endblock %}
