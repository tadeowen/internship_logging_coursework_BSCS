{% extends 'base.html' %}
{% block title %}Server Error - InternTrack{% endblock %}
{% block content %}
<div class="card text-center mx-auto" style="max-width:640px">
  <div class="display-4 fw-bold text-danger">500</div>
  <h1 class="mt-2">Something went wrong</h1>
  <p class="text-muted">The server could not complete the request. Please try again later or contact the system administrator.</p>
  <a class="btn btn-primary mt-1" href="{% url 'dashboard' %}">Back to Dashboard</a>
</div>
{% endblock %}
